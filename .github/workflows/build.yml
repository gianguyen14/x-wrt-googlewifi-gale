name: Build X-WRT Gale

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/build.sh"
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: xwrt-gale-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build firmware
        run: |
          chmod +x scripts/build.sh
          JOBS=2 ./scripts/build.sh

      - name: Collect firmware and logs
        if: always()
        run: |
          mkdir -p artifacts
          OUT="$HOME/xwrt-gale-build/x-wrt/bin/targets/ipq40xx/chromium"

          if [ -d "$OUT" ]; then
            cp -av "$OUT/." artifacts/
          fi

          if [ -f "$HOME/xwrt-gale-build/x-wrt/build-gale.log" ]; then
            cp -av "$HOME/xwrt-gale-build/x-wrt/build-gale.log" artifacts/
          fi

          if [ -f "$HOME/xwrt-gale-build/x-wrt/.config" ]; then
            cp -av "$HOME/xwrt-gale-build/x-wrt/.config" artifacts/config.build
          fi

      - name: Upload workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: x-wrt-googlewifi-gale-${{ github.sha }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/*google_wifi*factory.bin
            artifacts/*google_wifi*sysupgrade.bin
            artifacts/SHA256SUMS-GALE-XWRT
            artifacts/*.manifest
